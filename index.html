<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Железнодорожные билеты — Быстро и удобно</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Навигация -->
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo"><span>Платформа</span> 9 ¾</a>
            <nav class="nav">
                <a href="index.html" class="nav-link active">Поиск</a>
                <a href="#" class="nav-link" onclick="goToProfile(event)">Мои билеты</a>
                <a href="help.html" class="nav-link">Поддержка</a>
                <!-- Исправлено: Умный переход вместо прямой ссылки -->
                <a href="#" class="nav-link" onclick="goToProfile(event)">Личный кабинет</a>
            </nav>
        </div>
    </header>

    <main class="main container">
        <!-- Заголовок -->
        <section class="hero">
            <h1>Путешествуйте с комфортом</h1>
            <p>Быстрый поиск и безопасная покупка билетов на поезда по всей стране</p>
        </section>

        <!-- Форма поиска -->
        <section class="search-section">
           <form id="search-form" class="search-form">
  <div class="input-group">
    <label for="from">Откуда</label>
    <input type="text" id="from" list="from-list" placeholder="Город отправления" required autocomplete="off">
    <datalist id="from-list">
      <option value="Москва"></option>
      <option value="Санкт-Петербург"></option>
      <option value="Новосибирск"></option>
      <option value="Екатеринбург"></option>
      <option value="Казань"></option>
      <option value="Нижний Новгород"></option>
      <option value="Владивосток"></option>
    </datalist>
  </div>
  
  <button type="button" id="swap-btn" class="swap-btn" title="Поменять местами">⇄</button>
  
  <div class="input-group">
    <label for="to">Куда</label>
    <input type="text" id="to" list="to-list" placeholder="Город прибытия" required autocomplete="off">
    <datalist id="to-list">
      <!-- Сюда JavaScript будет динамически добавлять доступные города -->
    </datalist>
  </div>
  
  <div class="input-group">
    <label for="date">Дата</label>
    <input type="date" id="date" required>
  </div>
  
  <button type="submit" class="submit-btn">Найти билеты</button>
           </form>

        </section>
        <!-- Секция результатов (изначально скрыта) -->
        <section id="results-section" class="results-section hidden">
            <div class="results-header">
                <h2>Доступные рейсы</h2>
                <span id="results-count" class="badge">Найдено: 0</span>
            </div>
            <div id="tickets-container" class="tickets-grid">
                <!-- Сюда JS будет вставлять карточки поездов -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
