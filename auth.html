<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация — РЖДЭкспресс</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Минималистичные стили для контейнера формы */
        .auth-page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px); /* Вычитаем высоту шапки */
            padding: 40px 20px;
            background-color: var(--bg-color);
        }
        .auth-container { 
            background-color: var(--card-bg); 
            border-radius: var(--radius); 
            border: 1px solid var(--border-color); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); 
            width: 100%; 
            max-width: 650px; 
            overflow: hidden; 
            animation: fadeInUp 0.4s ease both; 
        }
        .auth-tabs { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border-color); }
        .tab-btn { padding: 20px; background: #fafafa; border: none; font-size: 15px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: var(--transition); letter-spacing: 0.5px; }
        .tab-btn.active { background-color: var(--card-bg); color: var(--primary); border-bottom: 2px solid var(--primary); }
        .auth-content { padding: 40px; }
        .auth-form.hidden { display: none; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .required { color: #d93025; margin-left: 2px; }
        .full-width { grid-column: span 2; width: 100%; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } .auth-content { padding: 20px; } }
    </style>
</head>
<body>

    <!-- Навигация (Ваша шапка) -->
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo"><span>Платформа</span> 9 ¾</a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Поиск</a>
                <a href="#" class="nav-link">Мои билеты</a>
                <a href="help.html" class="nav-link">Поддержка</a>
                <a href="auth.html" class="nav-link active">Личный кабинет</a>
            </nav>
        </div>
    </header>

    <!-- Обертка для центрирования формы под шапкой -->
    <div class="auth-page-wrapper">
        <div class="auth-container">
            <!-- Переключение вкладок -->
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login-form">ВХОД</button>
                <button class="tab-btn" data-tab="register-form">РЕГИСТРАЦИЯ</button>
            </div>

            <div class="auth-content">
                 <!-- Форма Входа --> 
 <form id="login-form" class="auth-form"> 
 <div class="input-group" style="margin-bottom: 20px;"> 
 <label>Email или Логин <span class="required">*</span></label> 
 <input type="text" id="login-field" placeholder="Введите ваш Email или Логин" required autocomplete="off"> 
 </div> 
 <div class="input-group" style="margin-bottom: 20px;"> 
 <label>Пароль <span class="required">*</span></label> 
 <input type="password" placeholder="Пароль" required> 
 </div> 
 
 <!-- ВСТАВИТЬ СЮДА: Блок для вывода ошибки -->
 <div id="auth-error-msg" style="color: #d93025; font-size: 14px; font-weight: 500; margin-bottom: 15px; display: none;"></div>
 
 <button type="submit" class="submit-btn full-width">Войти</button> 
 </form> 

                <!-- Форма Регистрации -->
                <form id="register-form" class="auth-form hidden">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Email <span class="required">*</span></label>
                            <input type="email" placeholder="Адрес электронной почты" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label>Логин <span class="required">*</span></label>
                            <input type="text" placeholder="Логин" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label>Пароль <span class="required">*</span></label>
                            <input type="password" placeholder="Пароль" required>
                        </div>
                        <div class="input-group">
                            <label>Подтверждение пароля <span class="required">*</span></label>
                            <input type="password" placeholder="Подтверждение пароля" required>
                        </div>
                        <div class="input-group">
                            <label>Имя <span class="required">*</span></label>
                            <input type="text" id="reg-name" placeholder="Имя" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label>Фамилия <span class="required">*</span></label>
                            <input type="text" placeholder="Фамилия" required autocomplete="off">
                        </div>
                        <div class="input-group full-width">
                            <label>Телефон</label>
                            <input type="tel" placeholder="Номер телефона" autocomplete="off">
                        </div>
                    </div>
                    <button type="submit" class="submit-btn full-width" style="margin-top: 20px;">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Переключатель вкладок Вход / Регистрация
        const tabs = document.querySelectorAll('.tab-btn');
        const forms = document.querySelectorAll('.auth-form');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                forms.forEach(f => f.classList.add('hidden'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.remove('hidden');
            });
        });

        // Запись сессии и перенаправление в ЛК после успешной отправки формы 
document.getElementById('login-form').addEventListener('submit', (e) => { 
    e.preventDefault(); 
    
    // Получаем введённый логин и находим поле пароля
    const loginInput = document.getElementById('login-field').value.trim();
    const passwordInput = e.target.querySelector('input[type="password"]').value.trim();
    
    // КРИТИЧЕСКАЯ ПРОВЕРКА: Если введены данные администратора
    if (loginInput === 'ФАС' && passwordInput === 'Ф6А7С6*') {
        localStorage.setItem('user_session_active', 'true'); 
        localStorage.setItem('user_role', 'admin'); // Передаем роль админа
        localStorage.setItem('user_display_name', 'Администратор ФАС'); 
        
        // Перенаправляем на созданную админку
        window.location.replace('admin.html');
    } else {
        // Обычный вход для любого другого пользователя
        localStorage.setItem('user_session_active', 'true'); 
        localStorage.setItem('user_role', 'passenger'); // Роль пассажира
        localStorage.setItem('user_display_name', loginInput); 
        
        // Перенаправляем в стандартный Личный кабинет
        window.location.replace('dashboard.html');
    }
}); 


        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('user_session_active', 'true');
            localStorage.setItem('user_display_name', document.getElementById('reg-name').value);
            window.location.replace('dashboard.html');
        });
    </script>
</body>
</html>
